name: check

on:
  workflow_dispatch:
  pull_request:
    types: [opened, reopened]
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.author.name, 'github-actions')
    steps:
      - uses: actions/checkout@v4
      - run: |
          BUMP="patch"